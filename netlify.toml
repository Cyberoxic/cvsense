[build]
  publish   = "."
  functions = "netlify/functions"

# Backend proxy for AI analysis
[[redirects]]
  from   = "/api/analyze"
  to     = "/.netlify/functions/analyze"
  status = 200

# Redirect root to auth if needed (Supabase OAuth callback lands here)
[[redirects]]
  from   = "/auth"
  to     = "/auth.html"
  status = 200

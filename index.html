<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Sense</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9346/9346212.png">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    /* Hide everything until session check completes */
    body.auth-loading { visibility: hidden; }

    /* Push page content below the user bar */
    body { padding-top: 52px; }

    /* ── User Bar ── */
    .user-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      z-index: 100;
    }

    .user-bar-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .user-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(45deg, var(--accent), var(--accent-mid));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }

    .user-email {
      font-size: 0.85rem;
      color: var(--muted);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .user-bar-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      background: linear-gradient(45deg, var(--accent), var(--accent-mid));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    .signout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 0.3rem 0.85rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .signout-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: var(--danger-light);
    }
  </style>
</head>
<body class="auth-loading">

  <!-- User Bar -->
  <div class="user-bar" id="user-bar" style="display:none">
    <div class="user-bar-left">
      <div class="user-avatar" id="user-avatar">CV</div>
      <span class="user-email" id="user-email"></span>
    </div>
    <button class="signout-btn" onclick="signOut()">Sign Out</button>
  </div>

  <header>
    <h1>CV Sense</h1>
    <p>AI-powered CV analyser according to job requirement</p>
  </header>

  <div class="container">

    <!-- INPUT -->
    <div id="input-section">

      <div class="card">
        <div class="card-label">Your CV (PDF)</div>
        <div class="upload-zone" id="dropzone">
          <input type="file" id="pdf-input" accept=".pdf" />
          <div class="upload-icon">📄</div>
          <div class="upload-text"><strong>Click to upload</strong> or drag &amp; drop</div>
          <div class="upload-text">PDF only · Max 5 MB</div>
          <div id="file-badge" style="display:none" class="file-badge">
            ✓ <span id="file-name"></span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Job Requirements</div>
        <textarea id="job-desc" placeholder="Paste the job requirements here…&#10;&#10;e.g. Required: Python, SQL, REST APIs, 2+ years experience…"></textarea>
      </div>

      <button class="analyze-btn" id="analyze-btn" disabled>Analyze CV</button>
      <div id="error-msg"></div>
      <p class="page-footer">Made with ❤️ by Souvik (@cyberoxic)</p>

    </div>

    <!-- LOADING -->
    <div id="loading-section" style="display:none" class="card loading-state">
      <div class="spinner"></div>
      <div id="loading-text" style="font-size:0.95rem">Reading your PDF…</div>
      <div style="font-size:0.82rem;color:var(--muted);margin-top:0.3rem">Usually under 10 seconds</div>
    </div>

    <!-- RESULTS -->
    <div id="results-section" style="display:none"></div>

  </div>

  <script src="app.js"></script>
  <script src="session.js"></script>
</body>
</html>

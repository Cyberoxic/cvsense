<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Sense — Sign In</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9346/9346212.png">
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* Override shared style.css body padding — not needed here,
       .auth-wrapper handles its own spacing */
    body { padding: 0; }

    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      animation: fadeInUp 0.5s ease-out;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      font-weight: 400;
      background: linear-gradient(45deg, var(--accent), var(--accent-mid));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-logo p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    .auth-tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 1.75rem;
      gap: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 0.55rem;
      border: none;
      border-radius: 8px;
      background: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .auth-tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(139,92,246,0.4);
    }

    .auth-form { display: flex; flex-direction: column; gap: 1rem; }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

    .form-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: var(--glow);
      background: var(--surface);
    }

    .form-input::placeholder { color: var(--muted); }

    .auth-btn {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(45deg, var(--accent), var(--accent-mid));
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(139,92,246,0.3);
      margin-top: 0.5rem;
    }

    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139,92,246,0.5); }
    .auth-btn:active { transform: scale(0.98); }
    .auth-btn:disabled { background: var(--muted); cursor: not-allowed; box-shadow: none; transform: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.5rem 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .google-btn {
      width: 100%;
      padding: 0.75rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .google-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }

    .google-icon {
      width: 18px; height: 18px;
    }

    .auth-message {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      text-align: center;
      display: none;
    }
    .auth-message.error { background: var(--danger-light); color: var(--danger); border: 1px solid var(--danger); display: block; }
    .auth-message.success { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent); display: block; }
    .auth-message.info { background: var(--info-light); color: var(--info); border: 1px solid var(--info); display: block; }

    .loading-dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-box">

      <div class="auth-logo">
        <h1>CV Sense</h1>
        <p>AI-powered CV analysis — sign in to continue</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Message -->
      <div class="auth-message" id="auth-message"></div>

      <!-- Google OAuth -->
      <button class="google-btn" id="google-btn" onclick="signInWithGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider">or</div>

      <!-- Login Form -->
      <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="auth-btn" id="login-btn">Sign In</button>
      </form>

      <!-- Signup Form -->
      <form class="auth-form" id="signup-form" style="display:none" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="signup-name" placeholder="Your Name" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="signup-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="signup-password" placeholder="Min. 6 characters" required minlength="6" />
        </div>
        <button type="submit" class="auth-btn" id="signup-btn">Create Account</button>
      </form>

    </div>
  </div>

  <script src="/auth.js"></script>
</body>
</html>
